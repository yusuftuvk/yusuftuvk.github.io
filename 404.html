<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru İşareti</title>
    <style>
        /* Sayfa içeriğini tam ortalamak için arka planı hazırlıyoruz */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Yazının parlaması için koyu arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Parlayıp sönecek yazı stili */
        .parlayan-yazi {
            color: #ffffff;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Animasyonu buraya bağlıyoruz: 3 saniyede bir, sonsuz döngü */
            animation: parlanmaEfekti 3s ease-in-out infinite; 
        }

        /* Parlama ve sönme efektinin detayları (Animasyon) */
        @keyframes parlanmaEfekti {
            0%, 100% {
                opacity: 0.3;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            }
            50% {
                opacity: 1;
                /* Neon benzeri bir parlama efekti için gölgelendirme */
                text-shadow: 0 0 20px #ff4757, 0 0 40px #ff4757, 0 0 60px #ff4757;
                color: #ff6b81; /* Parladığında hafif kırmızı/pembe tonu alması için */
            }
        }
    </style>
</head>
<body>

    <div class="parlayan-yazi">
        Ben obez miyim kanka?
    </div>

</body>
</html>
