<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meric seksi anısına..</title>
    <style>
        /* Sayfa içeriğini tam ortalamak için arka planı hazırlıyoruz */
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Yazının parlaması için koyu arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Parlayıp sönecek yazı stili */
        .parlayan-yazi {
            color: #ffffff;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            /* Animasyon: 3 saniyede bir, sonsuz döngü */
            animation: parlanmaEfekti 3s ease-in-out infinite; 
        }

        /* Küçük ekranlar (telefonlar) için yazı boyutunu ayarlıyoruz */
        @media (max-width: 768px) {
            .parlayan-yazi {
                font-size: 1.8rem;
            }
        }

        /* Parlama ve sönme efektinin detayları (Animasyon) */
        @keyframes parlanmaEfekti {
            0%, 100% {
                opacity: 0.2;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            }
            50% {
                opacity: 1;
                /* Neon benzeri bir parlama efekti */
                text-shadow: 0 0 20px #00d2d3, 0 0 40px #00d2d3, 0 0 60px #00d2d3;
                color: #1dd1a1; /* Parladığında turkuaz/yeşil tonu alması için */
            }
        }
    </style>
</head>
<body>

    <!-- Yazının geleceği boş alan -->
    <div id="yazi-alani" class="parlayan-yazi"></div>

    <script>
        // Sayfa her yenilendiğinde seçilecek yazı listesi
        const yazilar = [
            "Kanka ben gerçekten obez miyim?",
            "Beni hiç sevdin mi?",
            "Tuğçe sen iyi misin?",
            "Tuğce sen iyisen sorun yok.",
            "Doruğu ararım; keremi ararım.",
            "Doruk havuzu açtırdı."
        ];

        // Listeden rastgele bir indeks seçiyoruz
        const rastgeleIndeks = Math.floor(Math.random() * yazilar.length);

        // Seçilen yazıyı ekrandaki 'yazi-alani' isimli div'in içine basıyoruz
        document.getElementById("yazi-alani").innerText = yazilar[rastgeleIndeks];
    </script>

</body>
</html>
